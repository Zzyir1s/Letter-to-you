<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A Letter for You</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="intro" id="introText">
      For My Love, Bibii
    </div>
    <button class="btn" onclick="showLetter()">Read it</button>

    <div class="letter-container">
      <div class="letter" id="letterBox">
        <p id="typedText"></p>
        <img src="ttd.png" alt="Signature" class="signature" />
      </div>

      <div class="letter" id="letterBox2" style="display: none;">
        <p id="typedText2"></p>
        <img src="ttd.png" alt="Signature" class="signature" />
      </div>

      <button class="next-btn" id="nextBtn" onclick="showPage2()" style="display: none;">Next Page</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
